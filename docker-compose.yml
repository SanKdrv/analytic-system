services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - prometheus

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8000}"
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.54.1
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - ./ops/prometheus/render-prometheus.sh:/usr/local/bin/render-prometheus.sh:ro
    entrypoint:
      - /bin/sh
      - /usr/local/bin/render-prometheus.sh

  grafana:
    image: grafana/grafana:11.2.0
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/rag-operations.json
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
